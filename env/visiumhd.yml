name: visiumhd
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # Python dependencies
  - python=3.10
  - pip
  - numpy=1.23
  - pandas=1.5
  - matplotlib=3.7
  - seaborn=0.12
  - scipy=1.10
  - scikit-image=0.20
  - h5py=3.8
  - jupyterlab=4.0
  - ipykernel=6.22

  # Scanpy and spatial analysis
  - scanpy=1.9.3
  - anndata=0.9
  - squidpy=1.2
  - leidenalg=0.9

  # Pip packages not available in conda
  - pip:
      - tensorflow
      - bin2cell
      - stardist
      - csbdeep
      - pySTIM